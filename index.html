<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghibli-Inspired Page</title>
    <style>
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            background: linear-gradient(to bottom, #AEC6CF, #F0E3E5);
            color: #333;
            animation: fadeIn 1s;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        #header {
            text-align: center;
            padding: 50px;
            font-size: 2.5em;
            color: #FFB6C1;
        }
        #clouds {
            position: relative;
            top: 0;
            animation: float 5s infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .section {
            padding: 40px;
            margin: 20px;
            border-radius: 8px;
            background-color: rgba(255, 255, 255, 0.8);
        }
        #gallery {
            display: flex;
            justify-content: space-around;
            font-size: 3em;
        }
        #contact {
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="header">
        <h1>🌤️ Welcome to My Ghibli-Inspired Page! 🌤️</h1>
        <div id="clouds">☁️ ☁️ ☁️</div>
    </div>
    <div class="section" id="welcome">
        <h2>Welcome</h2>
        <p>Experience the magic of Ghibli with a touch of nature and nostalgia.</p>
    </div>
    <div class="section" id="gallery">
        <h2>Gallery</h2>
        <div>
            <span>🌾</span>
            <span>🏞️</span>
            <span>🌙</span>
        </div>
    </div>
    <div class="section" id="contact">
        <h2>Contact</h2>
        <p>Feel free to reach out!</p>
    </div>
</body>
</html>
