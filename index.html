<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>My Ghibli-Inspired Home</title>
  <link rel="stylesheet" href="/assets/styles.css"/>
</head>
<body>
  <nav class="nav-bar">
    <div class="nav-container">
      <div class="nav-logo"><span>GhibliDemo</span></div>
      <ul class="nav-links">
        <li><a href="#home">首页</a></li>
        <li><a href="#about">关于</a></li>
        <li><a href="#gallery">画廊</a></li>
        <li><a href="#contact">联系</a></li>
      </ul>
    </div>
  </nav>
  <header class="hero" id="home">
    <div class="hero-bg" aria-hidden="true">
      <img src="/images/banner.svg" alt="">
      <div class="bubble b1"></div>
      <div class="bubble b2"></div>
      <div class="bubble b3"></div>
    </div>
    <div class="hero-content">
      <h1>欢迎来到 Ghibli 梦想世界</h1>
      <p>温柔配色、卡片布局、原生动画，灵感源自你喜欢的模板。</p>
      <a class="hero-btn" href="#gallery">进入画廊</a>
    </div>
  </header>
  <main>
    <section id="about" class="section wrapper">
      <h2>关于本站</h2>
      <p>
        这是一个原创仿制的模板实现，采用治愈风配色，自然插画和动效，页面完全自适应。布局设计与 Mobanwang Demo 基本一致，各卡片内容可自由修改和扩充。
      </p>
    </section>
    <section id="gallery" class="section wrapper">
      <h2>画廊</h2>
      <div class="card-grid">
        <div class="card">
          <img src="/images/field.svg" alt="田野">
          <div class="card-title">春日田野</div>
          <div class="card-desc">绿意盎然 阳光温柔</div>
        </div>
        <div class="card">
          <img src="/images/cottage.svg" alt="小屋">
          <div class="card-title">森林小屋</div>
          <div class="card-desc">避世安静 温暖至极</div>
        </div>
        <div class="card">
          <img src="/images/night.svg" alt="夜空">
          <div class="card-title">静谧夜色</div>
          <div class="card-desc">繁星与思绪共舞</div>
        </div>
      </div>
    </section>
    <section id="contact" class="section wrapper">
      <h2>联系</h2>
      <form class="contact-form" onsubmit="return false;">
        <input type="text" placeholder="您的姓名" required>
        <input type="email" placeholder="邮箱" required>
        <textarea placeholder="留言..." required></textarea>
        <button type="submit">发送</button>
      </form>
    </section>
  </main>
  <footer class="footer">
    <div class="wrapper">
      <p>© 2026 Jason08Fr — 由 Copilot 原创生成</p>
    </div>
  </footer>
  <script src="/assets/main.js"></script>
</body>
</html>
